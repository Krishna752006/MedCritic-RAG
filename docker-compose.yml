version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - ENV=development
      - PORT=8000

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4173:4173"
    command: sh -c "npm install --silent && npm run dev -- --host 0.0.0.0 --port 4173"
    environment:
      - CHOKIDAR_USEPOLLING=true
